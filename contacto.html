<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contacto - Ignacio Vizoso. Sistemas, Datos e Inteligencia Artificial.">
    <title>Contacto | Ignacio Vizoso</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/human.css">
</head>

<body>
    <site-header base-path="./"></site-header>

    <main class="content-wrapper">
        <section class="section-contacto" style="padding-top: 8rem; min-height: 80vh;">
            <div class="section-center">
                <span class="overline">HABLEMOS</span>
                <h2>¿Empezamos a darle <em class="serif">forma</em> a tu proyecto?</h2>
                <p>Una charla sin presiones para ver cómo puedo ayudarte.</p>
            </div>
            <div class="form-container" style="margin-top: 3rem;">
                <form id="contact-form" action="#" novalidate>
                    <div class="form-row">
                        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required autocomplete="name">
                        <input type="text" id="empresa" name="empresa" placeholder="Tu empresa" required>
                    </div>
                    <div class="form-row">
                        <input type="email" id="email" name="email" placeholder="Tu correo electrónico" required autocomplete="email">
                    </div>
                    <textarea id="mensaje" name="mensaje" placeholder="Describe brevemente el problema o cuello de botella que quieres resolver..." rows="6" required></textarea>
                    
                    <button type="submit" class="btn btn-primary btn-full">AGENDAR UNA REUNIÓN</button>
                    <p class="form-note">También puedes contactarme directamente vía <a href="#" class="accent-link">LinkedIn</a>.</p>
                </form>
            </div>
        </section>
    </main>

    <site-footer base-path="./"></site-footer>
<script src="./scripts/components.js"></script>
</body>
</html>
